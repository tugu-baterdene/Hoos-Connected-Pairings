<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Hoos Connected Pairings
    </title>

    <link
        rel="stylesheet"
        href="/static/style.css"
    >

</head>

<body>

    <div class="background-glow glow1"></div>
    <div class="background-glow glow2"></div>

    <main class="container">

        <section class="left-section">

            <img
                src="/static/hero.png"
                alt="Hoos Connected"
                class="hero-image"
            >

        </section>

        <section class="right-section">

            <div class="card">

                <h1>
                    Hoos Connected
                    <span>Pairing System</span>
                </h1>

                <p class="subtitle">

                    Automatically generate optimized facilitator pairings
                    based on shared availability, experience balancing,
                    and confidence compatibility.

                </p>

                <form
                    action="/upload"
                    method="post"
                    enctype="multipart/form-data"
                    class="upload-form"
                >
                    <div class="weights-section">

                    <h3>
                        Optimization Weights
                    </h3>

                    <div class="slider-group">

                        <div class="slider-header">

                            <label>
                                Availability Overlap
                            </label>

                            <span id="overlap-value">
                                3
                            </span>

                        </div>

                        <input
                            type="range"
                            name="overlap_weight"
                            min="1"
                            max="10"
                            value="3"
                            oninput="
                                document.getElementById('overlap-value').innerText = this.value
                            "
                        >

                    </div>


                    <div class="slider-group">

                        <div class="slider-header">

                            <label>
                                Experience Balance
                            </label>

                            <span id="experience-value">
                                4
                            </span>

                        </div>

                        <input
                            type="range"
                            name="experience_weight"
                            min="1"
                            max="10"
                            value="4"
                            oninput="
                                document.getElementById('experience-value').innerText = this.value
                            "
                        >

                    </div>


                    <div class="slider-group">

                        <div class="slider-header">

                            <label>
                                Confidence Difference
                            </label>

                            <span id="confidence-value">
                                2
                            </span>

                        </div>

                        <input
                            type="range"
                            name="confidence_weight"
                            min="1"
                            max="10"
                            value="2"
                            oninput="
                                document.getElementById('confidence-value').innerText = this.value
                            "
                        >

                    </div>

                </div>

                    <label class="custom-file-upload">

                        <input
                            type="file"
                            name="file"
                            accept=".csv"
                            required
                        >

                        Upload CSV File

                    </label>

                    

                    <button type="submit">

                        Generate Pairings

                    </button>

                </form>

            </div>

        </section>

    </main>

</body>

</html>
